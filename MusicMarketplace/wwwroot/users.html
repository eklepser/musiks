<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        input:required, select:required {
            border-left: 4px solid #dc3545;
        }

            input:required:valid, select:required:valid {
                border-left-color: #28a745;
            }
    </style>
</head>
<body>
    <div class="nav-menu">
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="products.html">Товары</a></li>
            <li><a href="artists.html">Исполнители</a></li>
            <li><a href="concerts.html">Концерты</a></li>
            <li><a href="orders.html">Заказы</a></li>
            <li><a href="users.html" class="active">Пользователи</a></li>
            <li><a href="relations.html">Связи</a></li>
        </ul>
    </div>
    <div class="container">
        <h1>Управление пользователями</h1>
        <div class="form-card">
            <h2 id="form-title">Добавить пользователя</h2>
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <input type="text" id="login" placeholder="Логин*" required>
                <input type="email" id="email" placeholder="Email*" required>
                <input type="text" id="full-name" placeholder="ФИО*" required>
                <input type="password" id="password" placeholder="Пароль*">
                <button id="submit-btn">Добавить</button>
                <button id="cancel-btn" style="display:none;">Отмена</button>
            </div>
            <div id="error-message" class="error"></div>
            <div id="success-message" class="success"></div>
        </div>
        <table>
            <thead>
                <tr><th>ID</th><th>Логин</th><th>Email</th><th>ФИО</th><th>Дата регистрации</th><th>Действия</th></tr>
            </thead>
            <tbody id="user-tbody"><tr><td colspan="6">Загрузка...</td></tr></tbody>
        </table>
    </div>
    <script src="js/users.js"></script>
</body>
</html>
