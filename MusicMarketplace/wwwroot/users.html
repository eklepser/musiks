<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musiks - Управление пользователями</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    <div class="nav-menu">
        <ul>
            <li><a href="/products">Товары</a></li>
            <li><a href="/artists">Исполнители</a></li>
            <li><a href="/user">Мой профиль</a></li>
            <li style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
                <select id="user-select">
                    <option value="">-- Выберите пользователя --</option>
                </select>
                <button id="manage-users-btn" title="Управление пользователями" style="background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px;">⚙️👤</button>
            </li>
        </ul>
    </div>
    <div class="container">
        <h1>Управление пользователями</h1>
        <div class="form-card">
            <h2 id="user-form-title">Добавить пользователя</h2>
            <input type="hidden" id="user-edit-id">
            <div class="form-group-row">
                <input type="text" id="user-login" placeholder="Логин*" required>
                <input type="text" id="user-full-name" placeholder="ФИО*" required>
                <input type="email" id="user-email" placeholder="Email*" required>
                <input type="password" id="user-password" placeholder="Пароль*">
            </div>
            <div class="form-actions">
                <button id="user-submit">Добавить</button>
                <button id="user-cancel" style="display:none;">Отмена</button>
            </div>
        </div>
        <div class="filters-card">
            <h3>Фильтры и сортировка</h3>
            <div class="filter-group">
                <input type="text" id="search-user" placeholder="Поиск по имени/логину">
                <select id="user-sort">
                    <option value="date_desc">Дата (сначала новые)</option>
                    <option value="date_asc">Дата (сначала старые)</option>
                    <option value="name_asc">ФИО А-Я</option>
                    <option value="name_desc">ФИО Я-А</option>
                </select>
            </div>
            <div class="filter-group">
                <button id="apply-user-filters">Применить</button>
                <button id="clear-user-filters">Сбросить</button>
            </div>
        </div>
        <div class="stats-card">
            <p>Найдено пользователей: <span id="user-found-count" class="highlight-number">0</span></p>
        </div>
        <table id="users-table">
            <thead>
                <tr><th>ID</th><th>Логин</th><th>ФИО</th><th>Email</th><th>Дата регистрации</th><th>Действия</th></tr>
            </thead>
            <tbody id="users-tbody">
                <tr><td colspan="6" class="centered-message">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>
    <script src="js/toast.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/user-menu.js"></script>
    <script src="js/users.js"></script>
    <script>initUserMenu();</script>
</body>
</html>
