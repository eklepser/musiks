<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musiks - Журнал изменений</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    <div class="nav-menu">
        <ul>
            <li><a href="/products">Товары</a></li>
            <li><a href="/artists">Исполнители</a></li>
            <li><a href="/user">Мой профиль</a></li>
            <li><a href="/logs">Логи</a></li>
            <li style="margin-left: auto; display: flex; align-items: center; gap: 15px;">
                <select id="user-select">
                    <option value="">-- Выберите пользователя --</option>
                </select>
                <button id="manage-users-btn" title="Управление пользователями" class="manage-users-btn">⚙️👤</button>
            </li>
        </ul>
    </div>
    <div class="container">
        <h1>Журнал изменений</h1>
        <div class="filters-card">
            <div class="filter-group-container">
                <div class="filter-group">
                    <select id="filter-table">
                        <option value="">Все таблицы</option>
                        <option value="User">Пользователи</option>
                        <option value="Ticket">Билеты</option>
                        <option value="Clothing">Одежда</option>
                        <option value="Accessory">Аксессуары</option>
                        <option value="Concert">Концерты</option>
                        <option value="Genre">Жанры</option>
                        <option value="Artist">Исполнители</option>
                        <option value="Manufacturer">Производители</option>
                        <option value="Order">Заказы</option>
                    </select>
                    <select id="filter-operation">
                        <option value="">Все операции</option>
                        <option value="INSERT">Добавление</option>
                        <option value="UPDATE">Обновление</option>
                        <option value="DELETE">Удаление</option>
                    </select>
                    <select id="sort-by">
                        <option value="date_desc">Сначала новые</option>
                        <option value="date_asc">Сначала старые</option>
                    </select>
                    <button id="apply-filters">Применить</button>
                    <button id="clear-filters">Сбросить</button>
                </div>
            </div>
        </div>
        <div class="stats-card">
            <p>Найдено записей: <span id="found-count" class="highlight-number">0</span></p>
        </div>
        <table id="logs-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Таблица</th>
                    <th>ID записи</th>
                    <th>Операция</th>
                    <th>Данные до</th>
                    <th>Данные после</th>
                    <th>Время</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="logs-tbody">
                <tr><td colspan="8" class="centered-message">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="log-details-modal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width: 800px;">
            <h3>Детали записи</h3>
            <div id="log-details-content"></div>
            <div class="form-group" style="justify-content:center;margin-top:20px;">
                <button id="log-details-close" class="cancel-btn">Закрыть</button>
            </div>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/utils/toast.js"></script>
    <script src="js/utils/validators.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/api.js"></script>
    <script src="js/utils/modals.js"></script>
    <script src="js/components/productForms.js"></script>
    <script src="js/components/manufacturerForm.js"></script>
    <script src="js/components/genreForm.js"></script>
    <script src="js/components/artistConcertForms.js"></script>
    <script src="js/components/userForm.js"></script>
    <script src="js/components/catalog.js"></script>
    <script src="js/components/cartWishlist.js"></script>
    <script src="js/components/userDashboard.js"></script>
    <script src="js/components/userMenu.js"></script>
    <script src="js/pages/logs.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
