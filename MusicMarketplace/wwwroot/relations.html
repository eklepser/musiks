<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Связи</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: #e0e0e0;
            border: none;
            cursor: pointer;
        }

            .tab-btn.active {
                background: #007bff;
                color: white;
            }

        .tab-content {
            display: none;
        }

            .tab-content.active {
                display: block;
            }
    </style>
</head>
<body>
    <div class="nav-menu">
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="products.html">Товары</a></li>
            <li><a href="artists.html">Исполнители</a></li>
            <li><a href="concerts.html">Концерты</a></li>
            <li><a href="orders.html">Заказы</a></li>
            <li><a href="users.html">Пользователи</a></li>
            <li><a href="relations.html" class="active">Связи</a></li>
        </ul>
    </div>
    <div class="container">
        <h1>Управление связями</h1>
        <div class="tab-buttons">
            <button class="tab-btn active" data-tab="artist-concert">Исполнитель → Концерт</button>
            <button class="tab-btn" data-tab="artist-merch">Исполнитель → Мерч</button>
            <button class="tab-btn" data-tab="product-genre">Товар → Жанр</button>
        </div>

        <div id="artist-concert-tab" class="tab-content active">
            <div class="form-card">
                <h3>Добавить связь</h3>
                <div class="form-group">
                    <select id="ac-artist-id"><option value="">Исполнитель</option></select>
                    <select id="ac-concert-id"><option value="">Концерт</option></select>
                    <button id="ac-add-btn">Добавить</button>
                </div>
                <div id="ac-error" class="error"></div><div id="ac-success" class="success"></div>
            </div>
            <table>
                <thead><tr><th>Исполнитель</th><th>Концерт</th><th>Действия</th></tr></thead>
                <tbody id="ac-tbody"><tr><td colspan="3">Загрузка...</td></tr></tbody>
            </table>
        </div>

        <div id="artist-merch-tab" class="tab-content">
            <div class="form-card">
                <h3>Добавить связь</h3>
                <div class="form-group">
                    <select id="am-artist-id"><option value="">Исполнитель</option></select>
                    <select id="am-merch-id"><option value="">Мерч</option></select>
                    <button id="am-add-btn">Добавить</button>
                </div>
                <div id="am-error" class="error"></div><div id="am-success" class="success"></div>
            </div>
            <table>
                <thead><tr><th>Исполнитель</th><th>Мерч</th><th>Действия</th></tr></thead>
                <tbody id="am-tbody"><tr><td colspan="3">Загрузка...</td></tr></tbody>
            </table>
        </div>

        <div id="product-genre-tab" class="tab-content">
            <div class="form-card">
                <h3>Добавить связь</h3>
                <div class="form-group">
                    <select id="pg-product-id"><option value="">Товар</option></select>
                    <select id="pg-genre-id"><option value="">Жанр</option></select>
                    <button id="pg-add-btn">Добавить</button>
                </div>
                <div id="pg-error" class="error"></div><div id="pg-success" class="success"></div>
            </div>
            <table>
                <thead><tr><th>Товар</th><th>Жанр</th><th>Действия</th></tr></thead>
                <tbody id="pg-tbody"><tr><td colspan="3">Загрузка...</td></tr></tbody>
            </table>
        </div>
    </div>
    <script src="js/relations.js"></script>
</body>
</html>
